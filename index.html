<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>코드 찾기 앱</title>

<style>
body {
  font-family: sans-serif;
  text-align: center;
  background: #ffe4ec;
}

h1 {
  margin-top: 30px;
}

.keyboard {
  display: flex;
  justify-content: flex-start;
  overflow-x: auto;   /* 🔥 가로 스크롤 */
  padding: 20px;
}
/* 각 건반 묶음 */
.key {
  position: relative;
  margin-right: 2px; /* 살짝 띄우기 */
}

/* 흰 건반 */
.white {
  width: 70px;
  height: 260px;
  background: white;
  border: 1px solid #333;
  text-align: center;
  line-height: 240px;
  cursor: pointer;
}

.white.active {
  background: #ffd1dc;
}

/* 검은 건반 */
.black {
  position: absolute;
  width: 40px;
  height: 160px;
  background: black;
  top: 0;
  left: 50px; /* 🔥 핵심 수정 */
  z-index: 2;
  cursor: pointer;
}

.black.active {
  background: #ff4081;
}


button {
  margin: 10px;
  padding: 10px 20px;
  font-size: 16px;
}

#notes {
  margin-top: 20px;
}

#result {
  margin-top: 20px;
  font-size: 28px;
  font-weight: bold;
}
</style>
</head>

<body>

<h1>🎹 코드 찾기</h1>

<div class="keyboard">

  <!-- C -->
  <div class="key">
    <div class="white" data-note="C4">도</div>
    <div class="black" data-note="C#4"></div>
  </div>

  <!-- D -->

  </div>

  <!-- E -->

  </div>

  <!-- F -->
  <div class="key">

    <div class="black" data-note="F#4"></div>
  </div>

  <!-- G -->
  <div class="key">
    <div class="white" data-note="G4">솔</div>
    <div class="black" data-note="G#4"></div>
  </div>

  <!-- A -->
  <div class="key">
    <div class="white" data-note="A4">라</div>
    <div class="black" data-note="A#4"></div>
  </div>

  <!-- B -->
  <div class="key">
    <div class="white" data-note="B4">시</div>
  </div>

  <!-- 2옥타브 -->
  <div class="key">
    <div class="white" data-note="C5">도</div>
    <div class="black" data-note="C#5"></div>
  </div>

  <div class="key">
    <div class="white" data-note="D5">레</div>
    <div class="black" data-note="D#5"></div>
  </div>

  <div class="key">
    <div class="white" data-note="E5">미</div>
  </div>

  <div class="key">
    <div class="white" data-note="F5">파</div>
    <div class="black" data-note="F#5"></div>
  </div>

  <div class="key">
    <div class="white" data-note="G5">솔</div>
    <div class="black" data-note="G#5"></div>
  </div>

  <div class="key">
    <div class="white" data-note="A5">라</div>
    <div class="black" data-note="A#5"></div>
  </div>

  <div class="key">
    <div class="white" data-note="B5">시</div>
  </div>

  <!-- 🔥 3옥타브 (6번 옥타브) -->
<div class="key">
  <div class="white" data-note="C6">도</div>
  <div class="black" data-note="C#6"></div>
</div>

<div class="key">
  <div class="white" data-note="D6">레</div>
  <div class="black" data-note="D#6"></div>
</div>

<div class="key">
  <div class="white" data-note="E6">미</div>
</div>

<div class="key">
  <div class="white" data-note="F6">파</div>
  <div class="black" data-note="F#6"></div>
</div>

<div class="key">
  <div class="white" data-note="G6">솔</div>
  <div class="black" data-note="G#6"></div>
</div>

<div class="key">
  <div class="white" data-note="A6">라</div>
  <div class="black" data-note="A#6"></div>
</div>

<div class="key">
  <div class="white" data-note="B6">시</div>
</div>

</div>

<button onclick="findChord()">결과 보기</button>
<button onclick="reset()">초기화</button>

<div id="notes"></div>
<div id="result"></div>

<script>
  let selectedNotes = [];
document.addEventListener("DOMContentLoaded", function () {

  document.querySelectorAll('.white, .black').forEach(key => {
    key.addEventListener('click', () => {
      const note = key.dataset.note;

      if (selectedNotes.includes(note)) {
        selectedNotes = selectedNotes.filter(n => n !== note);
        key.classList.remove('active');
      } else {
        selectedNotes.push(note);
        key.classList.add('active');
      }

      document.getElementById("notes").innerText =
        "선택된 음: " + selectedNotes.map(cleanNote).join(", ");
    });
  });

});
// 음을 숫자로 변환 (음정 계산용)
const noteIndex = {
  "C4":0,"C#4":1,"D4":2,"D#4":3,"E4":4,"F4":5,
  "F#4":6,"G4":7,"G#4":8,"A4":9,"A#4":10,"B4":11,

  "C5":12,"C#5":13,"D5":14,"D#5":15,"E5":16,"F5":17,
  "F#5":18,"G5":19,"G#5":20,"A5":21,"A#5":22,"B5":23,

  "C6":24,"C#6":25,"D6":26,"D#6":27,"E6":28,"F6":29,
"F#6":30,"G6":31,"G#6":32,"A6":33,"A#6":34,"B6":35
};

  const allRoots = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];

  const enharmonicMap = {
  "C#": "Db",
  "D#": "Eb",
  "F#": "Gb",
  "G#": "Ab",
  "A#": "Bb"
};
  
function getInversion(root, selectedNotes, noteIndex) {
  const noteNums = selectedNotes.map(n => noteIndex[n]);

  const lowest = Math.min(...noteNums);

  const bassNote = Object.keys(noteIndex).find(
    key => noteIndex[key] === lowest
  );

  if (bassNote !== root) {
    const base = cleanNote(bassNote);

if (enharmonicMap[base]) {
  return " / " + base + " or " + enharmonicMap[base];
}

return " / " + base;
  }

  return "";
}
  
// 코드 찾기 (재즈 확장)
function findChord() {
  if (selectedNotes.length < 2) {
    return show("2개 이상 선택!");
  }

  const nums = selectedNotes.map(n => noteIndex[n] % 12);

  let bestScore = -1;
  let bestChord = "";

  for (let root of allRoots) {

    const rootIdx = noteIndex[root + "4"] % 12;

    const intervals = [...new Set(
      nums.map(n => (n - rootIdx + 12) % 12)
    )];

    const chordTypes = [
      "13","11","9",
      "maj7","7","m7","mM7",
      "m","dim","aug","sus4",""
    ];

    for (let type of chordTypes) {

      let score = scoreChord(intervals, type);

      score += intervals.length * 0.2;

      if (score > bestScore) {
        bestScore = score;
        const inversion = getInversion(root + "4", selectedNotes, noteIndex);
bestChord = formatChord(root + "4", type, inversion);
      }
    }
  }

  show(bestChord || "알 수 없음");
}


// 배열 포함 체크
function match(arr, target) {
  return target.every(t => arr.includes(t));
}

function scoreChord(intervals, type) {
  let score = 0;

  const has = (i) => intervals.includes(i);

  // 🔥 루트 있으면 크게 가산점 (핵심)
  if (has(0)) score += 3;
  else score -= 2;

  // 3도 (코드 성격 핵심)
  if (has(4)) score += 2;
  if (has(3)) score += 2;

  // 7도
  if (has(10) || has(11)) score += 1;

  switch(type) {

    case "13":
      if (has(9)) score += 2;
      break;

    case "11":
      if (has(5)) score += 2;
      break;

    case "9":
      if (has(2)) score += 2;
      break;

    case "mM7":
      if (has(3) && has(11)) score += 2;
      break;

    case "maj7":
      if (has(4) && has(11)) score += 2;
      break;

    case "7":
      if (has(4) && has(10)) score += 2;
      break;

    case "m7":
      if (has(3) && has(10)) score += 2;
      break;

    case "add9":
      if (has(2) && has(4)) score += 2;
      break;

    case "dim":
      if (has(3) && has(6)) score += 2;
      break;

    case "aug":
      if (has(4) && has(8)) score += 2;
      break;

    case "sus4":
      if (has(5) && has(7)) score += 1;
      break;

    case "m":
      if (has(3)) score += 2;
      break;

    case "":
      if (has(4)) score += 2;
      break;
  }

  return score;
}

// 결과 출력
function show(text) {
  document.getElementById("result").innerText = text;
}

function cleanNote(note) {
  return note.replace(/[0-9]/g, '');
}

  function formatChord(root, type, inversion) {
  const base = cleanNote(root);

  if (enharmonicMap[base]) {
    return (
      base + type + inversion +
      " or " +
      enharmonicMap[base] + type + inversion
    );
  }

  return base + type + inversion;
}

// 초기화
function reset() {
  selectedNotes = [];
  document.querySelectorAll('.white, .black').forEach(k => {
    k.classList.remove('active');
  });
  document.getElementById("notes").innerText = "";
  document.getElementById("result").innerText = "";
}
</script>

</body>
</html>
