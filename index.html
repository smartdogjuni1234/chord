<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>코드 찾기 앱</title>

<style>
body {
  font-family: sans-serif;
  text-align: center;
  background: #ffe4ec;
}

h1 {
  margin-top: 30px;
}

.keyboard {
  position: relative;
  width: 1120px; /* 2옥타브 */
  margin: 40px auto;
}

/* 흰 건반 */
.white {
  width: 80px;
  height: 260px;
  background: white;
  border: 1px solid #333;
  display: inline-block;
  position: relative;
  z-index: 1;
  cursor: pointer;
}

.white.active {
  background: #ffd1dc;
}

/* 검은 건반 */
.black {
  width: 50px;
  height: 160px;
  background: black;
  position: absolute;
  z-index: 2;
  top: 0;
  cursor: pointer;
}

.black.active {
  background: #ff4081;
}

/* 검은 건반 위치 */
.black.n1 { left: 60px; }   /* C# */
.black.n2 { left: 140px; }  /* D# */
.black.n3 { left: 300px; }  /* F# */
.black.n4 { left: 380px; }  /* G# */
.black.n5 { left: 460px; }  /* A# */

.black.n6 { left: 620px; }
.black.n7 { left: 700px; }
.black.n8 { left: 860px; }
.black.n9 { left: 940px; }
.black.n10 { left: 1020px; }
}

button {
  margin: 10px;
  padding: 10px 20px;
  font-size: 16px;
}

#notes {
  margin-top: 20px;
}

#result {
  margin-top: 20px;
  font-size: 28px;
  font-weight: bold;
}
</style>
</head>

<body>

<h1>🎹 코드 찾기</h1>

<div class="keyboard">

 <!-- 🔥 흰 건반 (2옥타브) -->
  <div class="white" data-note="C">도</div>
  <div class="white" data-note="D">레</div>
  <div class="white" data-note="E">미</div>
  <div class="white" data-note="F">파</div>
  <div class="white" data-note="G">솔</div>
  <div class="white" data-note="A">라</div>
  <div class="white" data-note="B">시</div>

  <div class="white" data-note="C">도</div>
  <div class="white" data-note="D">레</div>
  <div class="white" data-note="E">미</div>
  <div class="white" data-note="F">파</div>
  <div class="white" data-note="G">솔</div>
  <div class="white" data-note="A">라</div>
  <div class="white" data-note="B">시</div>

  <!-- 🔥 검은 건반 -->
  <div class="black n1" data-note="C#"></div>
  <div class="black n2" data-note="D#"></div>
  <div class="black n3" data-note="F#"></div>
  <div class="black n4" data-note="G#"></div>
  <div class="black n5" data-note="A#"></div>

  <div class="black n6" data-note="C#"></div>
  <div class="black n7" data-note="D#"></div>
  <div class="black n8" data-note="F#"></div>
  <div class="black n9" data-note="G#"></div>
  <div class="black n10" data-note="A#"></div>

</div>

<button onclick="findChord()">결과 보기</button>
<button onclick="reset()">초기화</button>

<div id="notes"></div>
<div id="result"></div>

<script>
let selectedNotes = [];

// 모든 건반 클릭 이벤트
document.querySelectorAll('.white, .black').forEach(key => {
  key.addEventListener('click', () => {
    const note = key.dataset.note;

    if (selectedNotes.includes(note)) {
      selectedNotes = selectedNotes.filter(n => n !== note);
      key.classList.remove('active');
    } else {
      selectedNotes.push(note);
      key.classList.add('active');
    }

    document.getElementById("notes").innerText =
      "선택된 음: " + selectedNotes.join(", ");
  });
});

// 음을 숫자로 변환 (음정 계산용)
const noteIndex = {
  "C":0,"C#":1,"D":2,"D#":3,"E":4,"F":5,
  "F#":6,"G":7,"G#":8,"A":9,"A#":10,"B":11
};
  
function getInversion(root, selectedNotes, noteIndex) {
  const noteNums = selectedNotes.map(n => noteIndex[n]);

  const lowest = Math.min(...noteNums);

  const bassNote = Object.keys(noteIndex).find(
    key => noteIndex[key] === lowest
  );

  if (bassNote !== root) {
    return " / " + bassNote;
  }

  return "";
}
  
// 코드 찾기
function findChord() {
  if (selectedNotes.length < 3) {
    document.getElementById("result").innerText = "3개 이상 선택해줘!";
    return;
  }

  const sorted = selectedNotes.map(n => noteIndex[n]).sort((a,b)=>a-b);

  for (let root of selectedNotes) {
    const rootIdx = noteIndex[root];

    const intervals = sorted.map(n => (n - rootIdx + 12) % 12);
    let type = null;

    // Major
    if (match(intervals, [0,4,7])) {
      const inversion = getInversion(root, selectedNotes, noteIndex);
      return show(root + " Major" + inversion);
    }

    // Minor
    if (match(intervals, [0,3,7])) {
      const inversion = getInversion(root, selectedNotes, noteIndex);
return show(root + " minor" + inversion);
    }

    // Diminished
    if (match(intervals, [0,3,6])) {
      const inversion = getInversion(root, selectedNotes, noteIndex);
return show(root + " dim" + inversion);
    }

    // 7
    if (match(intervals, [0,4,7,10])) {
      return show(root + "7");
    }

    // minor7
    if (match(intervals, [0,3,7,10])) {
      const inversion = getInversion(root, selectedNotes, noteIndex);
return show(root + " m7" + inversion);
    }

    // sus4
    if (match(intervals, [0,5,7])) {
      const inversion = getInversion(root, selectedNotes, noteIndex);
return show(root + " sus4" + inversion);
    }
  }

  show("알 수 없는 코드");
}

// 배열 포함 체크
function match(arr, target) {
  return target.every(t => arr.includes(t));
}

// 결과 출력
function show(text) {
  document.getElementById("result").innerText = text;
}

// 초기화
function reset() {
  selectedNotes = [];
  document.querySelectorAll('.key, .white, .black').forEach(k => {
    k.classList.remove('active');
  });
  document.getElementById("notes").innerText = "";
  document.getElementById("result").innerText = "";
}
</script>

</body>
</html>
